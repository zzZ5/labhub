services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-labhub}
      POSTGRES_USER: ${POSTGRES_USER:-labhub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-labhub} -d ${POSTGRES_DB:-labhub}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: labhub-backend:prod
    build:
      context: ./backend
      target: prod
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
      POSTGRES_HOST: db
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 60
    volumes:
      - staticfiles:/app/staticfiles
      - media:/app/media
      - protected_media:/app/protected_media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
  celery_worker:
    image: labhub-backend:prod
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
      POSTGRES_HOST: db
    command: celery -A config worker -l info
    volumes:
      - media:/app/media
      - protected_media:/app/protected_media
    depends_on:
      - backend

  celery_beat:
    image: labhub-backend:prod
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
      POSTGRES_HOST: db
    command: celery -A config beat -l info
    volumes:
      - media:/app/media
      - protected_media:/app/protected_media
    depends_on:
      - backend

  frontend:
    build:
      context: ./frontend
      target: prod
    volumes:
      - frontend_dist:/usr/share/nginx/html
    command: sh -c "cp -r /app/dist/. /usr/share/nginx/html && tail -f /dev/null"

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${NGINX_HTTP_PORT:-8088}:80"
      - "${NGINX_HTTPS_PORT:-8443}:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./deploy/ssl:/etc/nginx/ssl:ro
      - frontend_dist:/usr/share/nginx/html:ro
      - staticfiles:/app/staticfiles:ro
      - media:/app/media:ro
    depends_on:
      - backend
      - frontend
volumes:
  postgres_data:
  staticfiles:
  media:
  protected_media:
  frontend_dist:
